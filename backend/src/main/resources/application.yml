server:
  port: 8080

spring:
  application:
    name: realworld-backend

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:realworld;DB_CLOSE_DELAY=-1
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  sql:
    init:
      mode: always

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

jwt:
  secret: realworld-secret-key-2024-for-jwt-token-generation
  expiration: 86400000